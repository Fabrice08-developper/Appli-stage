<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="s.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
</head>
<body>
    <div class="wrapper">
        <div class="form-container sign-up">
            <form action="#">
                <h2>sign-up</h2>
                <div class="form-group">
                    <input type="text" name="" id="" required>
                    <i class="fas fa-user"></i>
                    <label for="">Username</label>
                </div>
                <div class="form-group">
                    <input type="email" name="" id="" required>
                    <i class="fas fa-at"></i>
                    <label for="">Email</label>
                </div>
                <div class="form-group">
                    <input type="text" name="" id="" required>
                    <i class="fas fa-lock"></i>
                    <label for="">Password</label>
                </div>
                <div class="form-group">
                    <input type="text" name="" id="" required>
                    <i class="fas fa-lock"></i>
                    <label for="">Confirmez votre mot de passe</label>
                </div>
                <button type="submit" class="btn">Sign up</button>
                <div class="link">
                    <p>Avez vous deja un compte ?<a href="#" class="signin-link"> sign in</a></p>
                </div>
            </form>
        </div>
    </div>

    <div class="wrapper">
        <div class="form-container sign-in">
            <form action="#">
                <h2>Login</h2>
                <div class="form-group">
                    <input type="text" name="" id="" required>
                    <i class="fas fa-user"></i>
                    <label for="">Username</label>
                </div>
                <div class="form-group">
                    <input type="text" name="" id="" required>
                    <i class="fas fa-lock"></i>
                    <label for="">Password</label>
                </div>
                <div class="forgot-pass">
                    <a href="#">Mot de passe oublié ?</a>
                </div>
                <button type="submit" class="btn">Login</button>
                <div class="link">
                    <p>Vous n'avez pas de compte ?<a href="#" class="signup-link">sign up</a></p>
                </div>
            </form>
        </div>
    </div>
    <script src="https://kit.fontawesome.com/7277887ec4.js" crossorigin="anonymous"></script>
</body>
</html>
